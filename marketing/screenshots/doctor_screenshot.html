<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:480px;height:320px;font-family:'Inter',-apple-system,sans-serif;background:#0A0A0F;color:#EDEDF5;overflow:hidden}
.head{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.head-dot{width:8px;height:8px;border-radius:50%}
.head-title{font-size:12px;color:#5E5E78;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
.body{padding:14px 18px}
.rx-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;margin-bottom:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04)}
.rx-item.p0{border-left:2px solid #ef4444;background:rgba(239,68,68,0.04)}
.rx-item.p1{border-left:2px solid #f59e0b;background:rgba(245,158,11,0.03)}
.rx-item.p2{border-left:2px solid #5E5E78;background:rgba(255,255,255,0.01)}
.rx-pri{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:20px;padding-top:1px}
.rx-pri.p0{color:#ef4444}.rx-pri.p1{color:#f59e0b}.rx-pri.p2{color:#5E5E78}
.rx-info{flex:1}
.rx-title{font-size:12px;font-weight:600;margin-bottom:3px;color:#EDEDF5}
.rx-detail{font-size:10px;color:#9A9AB0;line-height:1.4}
.rx-meta{display:flex;gap:10px;margin-top:4px}
.rx-meta span{font-size:9px;color:#5E5E78;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,0.03);padding:2px 6px;border-radius:3px}
</style></head><body>
<div class="head">
  <div class="head-dot" style="background:#FF5F56"></div><div class="head-dot" style="background:#FFBD2E"></div><div class="head-dot" style="background:#27C93F"></div>
  <div class="head-title">DOCTOR 处方 · UGREEN.COM</div>
</div>
<div class="body">
  <div class="rx-item p0">
    <div class="rx-pri p0">P0</div>
    <div class="rx-info">
      <div class="rx-title">添加 FAQPage 结构化数据</div>
      <div class="rx-detail">为产品FAQ页面添加JSON-LD Schema标记，提升AI对内容结构的理解</div>
      <div class="rx-meta"><span>影响 ★★★★</span><span>难度 ★★</span><span>2-3天</span></div>
    </div>
  </div>
  <div class="rx-item p0">
    <div class="rx-pri p0">P0</div>
    <div class="rx-info">
      <div class="rx-title">发布3篇权威媒体评测</div>
      <div class="rx-detail">获取第三方权威媒体对产品的评测文章，建立外部信任信号</div>
      <div class="rx-meta"><span>影响 ★★★★</span><span>难度 ★★★</span><span>2-4周</span></div>
    </div>
  </div>
  <div class="rx-item p1">
    <div class="rx-pri p1">P1</div>
    <div class="rx-info">
      <div class="rx-title">重写 About 页品牌定位</div>
      <div class="rx-detail">强化品牌差异化描述，明确与竞品的区分度</div>
      <div class="rx-meta"><span>影响 ★★★</span><span>难度 ★★</span><span>1周</span></div>
    </div>
  </div>
  <div class="rx-item p2">
    <div class="rx-pri p2">P2</div>
    <div class="rx-info">
      <div class="rx-title">建立产品对比页面（vs Anker）</div>
      <div class="rx-detail">创建客观的产品参数对比页面，引导AI引用品牌对比信息</div>
      <div class="rx-meta"><span>影响 ★★★</span><span>难度 ★★★</span><span>1-2周</span></div>
    </div>
  </div>
</div>
</body></html>
