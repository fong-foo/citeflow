<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CiteFlow 抖音品宣</title>
  <style>
    :root {
      --bg: #0A0A0F;
      --card: #131318;
      --border: #222228;
      --accent: #3B82F6;
      --accent2: #38BDF8;
      --text: #ffffff;
      --text2: #8892a8;
      --red: #ef4444;
      --green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow */
    .glow-top {
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .glow-bottom {
      position: absolute;
      bottom: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(56,189,248,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid pattern */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 80px;
      max-width: 920px;
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 8px 20px;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 100px;
      font-size: 22px;
      color: var(--accent2);
      letter-spacing: 0.15em;
      margin-bottom: 50px;
      font-weight: 500;
    }

    /* Main headline */
    .headline {
      font-size: 72px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .headline .accent {
      color: var(--accent);
    }

    .headline .strike {
      color: var(--text2);
      position: relative;
    }

    /* Subheadline */
    .subhead {
      font-size: 30px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 60px;
      font-weight: 400;
    }

    /* Stats row */
    .stats {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-bottom: 70px;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
      font-size: 56px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 10px;
    }

    .stat-number.red { color: var(--red); }
    .stat-number.green { color: var(--green); }

    .stat-label {
      font-size: 20px;
      color: var(--text2);
      font-weight: 400;
    }

    /* Engine icons row */
    .engines {
      display: flex;
      justify-content: center;
      gap: 36px;
      margin-bottom: 70px;
    }

    .engine {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: all 0.3s;
    }

    .engine.active {
      border-color: rgba(59,130,246,0.4);
      color: var(--accent);
      box-shadow: 0 0 40px rgba(59,130,246,0.1);
    }

    /* CTA */
    .cta {
      display: inline-block;
      padding: 20px 56px;
      background: var(--accent);
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      border-radius: 16px;
      letter-spacing: 0.02em;
    }

    .cta-sub {
      display: block;
      margin-top: 20px;
      font-size: 22px;
      color: var(--text2);
      font-weight: 400;
    }

    /* Bottom logo */
    .brand {
      position: absolute;
      bottom: 80px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    .brand-name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .brand-tag {
      font-size: 16px;
      color: var(--text2);
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="content">
    <div class="badge">AI 品牌可见度检测</div>

    <div class="headline">
      你的品牌<br>
      在 <span class="accent">ChatGPT</span> 里<br>
      <span class="strike">搜得到吗？</span>
    </div>

    <div class="subhead">
      90% 的中国跨境品牌，AI 引用率为零
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number red">0%</div>
        <div class="stat-label">平均 AI 引用率</div>
      </div>
      <div class="stat">
        <div class="stat-number">3min</div>
        <div class="stat-label">免费检测</div>
      </div>
      <div class="stat">
        <div class="stat-number green">4</div>
        <div class="stat-label">大 AI 引擎覆盖</div>
      </div>
    </div>

    <div class="engines">
      <div class="engine active">ChatGPT</div>
      <div class="engine">Gemini</div>
      <div class="engine">Claude</div>
      <div class="engine">Perplexity</div>
    </div>

    <div>
      <div class="cta">免费检测你的品牌</div>
      <span class="cta-sub">3 分钟 · 覆盖 4 大 AI 引擎 · 给处方不只给分</span>
    </div>
  </div>

  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">CiteFlow</span>
    <span class="brand-tag">跨境出海 GEO 平台</span>
  </div>
</body>
</html>
