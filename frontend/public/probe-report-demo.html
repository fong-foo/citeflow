function sc(c){return c>=80?'#22C55E':c>=60?'#38BDF8':c>=40?'#F59E0B':'#EF4444'}
function fp(v){return v==null?'—':(Math.round(v*10)/10).toFixed(1)+'%'}
function tr(s,m){return s?s.length>m?s.slice(0,m)+'…':s:''}

function secLabel(id,text){
  return `<div class="sec-label" id="${id}">
    <div class="bar"></div>
    <span>${text}</span>
  </div>`;
}
function empty(title,reason){
  return `<div class="empty"><p class="text-sm text-muted">${title} — 暂无数据</p><p class="text-xs mt-2" style="color:#3A3A52">${reason}</p></div>`;
}
function scoreBar(score,h=4){
  const p=Math.min(Math.max(score/100*100,2),98);
  return `<div class="score-bar" style="height:${h}px"><div class="score-bar-fill" style="width:${p}%;background:${sc(score)}"></div></div>`;
}
function tag(text,cls){return `<span class="tag ${cls}">${text}</span>`;}

    if(!mp.perceived_weaknesses?.length)h+=`<span class="text-xs text-muted">暂无数据</span>`;
    h+=`</div></div></div>`;
    if(mp.perceived_positioning)h+=`<div class="card"><div class="card-label">AI 定位</div><p class="text-sm text-secondary leading-relaxed">${mp.perceived_positioning}</p></div>`;
  }
  if(an?.ideal_description){
    h+=`<div class="card"><div class="card-label">AI 理想描述</div><p class="text-sm text-secondary leading-relaxed italic mb-3">&ldquo;${an.ideal_description}&rdquo;</p>`;
    if(an.keywords?.length){
      h+=`<div class="flex flex-wrap gap-2">`;
      an.keywords.forEach(k=>h+=tag(k,'tag-blue'));
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  return h;
}

function renderS3(gap,ce){
  if(!gap&&!ce)return empty('认知差距','未返回差距分析数据');
  let h='';
  if(gap){
    h+=`<div class="card text-center relative corner-accent">
      <div class="card-label">品牌自述 vs AI 认知 · 对齐度</div>
      <div class="score-big" style="color:${sc(gap.alignment_score||0)};font-size:48px">${gap.alignment_score??'—'}</div>
      <p class="text-xs text-muted mt-2">满分 100</p>
      <div class="max-w-xs mx-auto">${scoreBar(gap.alignment_score||0)}</div>
      ${gap.one_line_summary?`<p class="text-sm text-secondary leading-relaxed mt-3">${gap.one_line_summary}</p>`:''}
    </div>`;

    h+=`<div class="grid2"><div class="card"><div class="card-label">对齐项 ✓</div><div class="flex flex-wrap gap-2">`;
    (gap.aligned||[]).forEach(item=>h+=tag(item,'tag-green'));
    if(!gap.aligned?.length)h+=`<span class="text-xs text-muted">暂无数据</span>`;
    h+=`</div></div><div class="card"><div class="card-label">偏差项 ✗</div><div class="flex flex-wrap gap-2">`;
    (gap.misaligned||[]).forEach(item=>h+=tag(item,'tag-red'));
    if(!gap.misaligned?.length)h+=`<span class="text-xs text-muted">暂无数据</span>`;
    h+=`</div></div></div>`;

    h+=`<div class="grid2"><div class="card"><div class="card-label">盲点 ⚠</div><div class="flex flex-wrap gap-2">`;
    (gap.blind_spots||[]).forEach(item=>h+=tag(item,'tag-amber'));
    if(!gap.blind_spots?.length)h+=`<span class="text-xs text-muted">暂无数据</span>`;
    h+=`</div></div><div class="card"><div class="card-label">机会 💡</div><div class="flex flex-wrap gap-2">`;
    (gap.opportunities||[]).forEach(item=>h+=tag(item,'tag-blue'));
    if(!gap.opportunities?.length)h+=`<span class="text-xs text-muted">暂无数据</span>`;
    h+=`</div></div></div>`;

    if(gap.has_target_gap){
      h+=`<div class="card" style="background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.03);opacity:0.85">
        <div class="flex items-center gap-2 mb-2"><span class="text-xs font-mono uppercase" style="color:#5E5E78">参考：品牌期望 vs AI 认知</span><span class="font-mono text-xs" style="color:#38BDF8">${gap.target_alignment_score||'—'}/100</span></div>
        <div class="grid2"><div><p class="text-xs font-mono text-green mb-1">已对齐</p>${(gap.target_aligned||[]).map(item=>`<p class="text-xs text-secondary">· ${item}</p>`).join('')}</div>
        <div><p class="text-xs font-mono text-red mb-1">未对齐</p>${(gap.target_misaligned||[]).map(item=>`<p class="text-xs text-secondary">· ${item}</p>`).join('')}</div></div></div>`;
    }
  }
  if(ce){
    h+=`<div class="card"><div class="card-label">公司评估</div>`;
    if(ce.overall)h+=`<p class="text-sm text-secondary leading-relaxed mb-3">${ce.overall}</p>`;
    if(ce.positioning)h+=`<p class="text-xs text-accent mb-2">定位：${ce.positioning}</p>`;
    h+=`<div class="grid2 mt-3"><div><p class="text-xs font-mono text-green mb-1">优势</p>${(ce.strengths||[]).map(s=>`<p class="text-xs text-secondary">· ${s}</p>`).join('')}</div>
      <div><p class="text-xs font-mono text-red mb-1">劣势</p>${(ce.weaknesses||[]).map(w=>`<p class="text-xs text-secondary">· ${w}</p>`).join('')}</div></div></div>`;
  }
  return h;
}

function renderS4(er){
  const engines=Object.entries(er||{});
  if(!engines.length)return empty('引擎对比','未返回引擎对比数据');
  let h=`<p class="text-xs text-muted leading-relaxed mb-4">三个 AI 引擎独立搜索同一套查询词，交叉验证品牌在不同 AI 系统中的可见度。</p>`;
  if(engines.length){
    h+=`<div class="grid3">`;
    engines.forEach(([key,e])=>{
      const answers=(e?.raw_data?.answers||[]).slice(0,5);
      h+=`<div class="engine-card">
        <div class="engine-card-top">
          <div class="engine-name">${EDISPLAY[key]||key}</div>
          <div class="engine-stat"><div class="engine-stat-label">引用率</div><div class="engine-stat-val">${fp(e?.citation_rate)}</div></div>
          <div class="engine-stat"><div class="engine-stat-label">推荐率</div><div class="engine-stat-val">${fp(e?.recommendation_rate)}</div></div>
        </div>
        ${answers.length?`<div class="engine-answers-body">
          ${answers.map(a=>`
            <div class="engine-answer-item">
              <p class="text-muted font-mono text-xs">Q: ${tr(a.query,60)}</p>
              <p class="mt-1">${tr(typeof a.answer==='string'?a.answer:'',180)}</p>
            </div>
          `).join('')}
        </div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function renderS5(ca,brandName){
  if(!ca||!ca.length)return empty('竞品战场','未返回竞品对比数据');
  const winCount=ca.filter(c=>c.winner?.toLowerCase().includes(brandName.toLowerCase())).length;
  let h=`<div class="table-wrap"><div class="table-row table-hdr" style="grid-template-columns:1fr 70px 1fr 36px">
    <span>查询场景</span><span class="text-center">赢家</span><span class="text-center">原因</span><span></span></div>`;
  ca.forEach((c,i)=>{
    const isWin=c.winner?.toLowerCase().includes(brandName.toLowerCase());
    const isTie=c.winner?.toLowerCase()==='tie'||c.winner?.toLowerCase().includes('平');
    const wc=isWin?'win':isTie?'tie':'lose';
    const wlabel=isWin?'我们赢':isTie?'平局':tr(c.winner,10);
    const hasDetail=c.dimension_scores?.length>0;
    h+=`<div class="table-row" id="card-comp${i}" style="grid-template-columns:1fr 70px 1fr 36px;border-left:2px solid transparent" onclick="toggleExpand('comp${i}')">
      <span class="text-secondary leading-relaxed">${tr(c.query,50)}</span>
      <span class="text-center font-mono ${wc}">${wlabel}</span>
      <span class="text-center text-muted leading-relaxed">${tr(c.reason,80)}</span>
      <span class="text-right font-mono text-[8px] text-muted" id="hint-comp${i}">${hasDetail?'展开 ▼':''}</span>
    </div>`;
    if(c.dimension_scores?.length){
      h+=`<div class="expand-detail" id="expand-comp${i}">
        <p class="text-xs font-mono text-accent mb-2">维度评分</p>`;
      c.dimension_scores.forEach(ds=>{
        h+=`<div class="flex items-center gap-3 mb-1"><span class="text-xs font-mono text-muted shrink-0" style="width:72px">${ds.dimension}</span>`;
        (ds.rankings||[]).forEach(r=>{
          const isUs=r.brand?.toLowerCase().includes(brandName.toLowerCase());
          h+=`<span class="tag" style="${isUs?'background:rgba(34,197,94,0.08);color:#22C55E':'background:rgba(255,255,255,0.03);color:#9A9AB0'}">${r.brand} #${r.rank}</span>`;
        });
        h+=`</div>`;
      });
      h+=`</div>`;
    }
  });
  h+=`</div>
  <div class="text-center mt-3"><span class="text-xs font-mono text-secondary">你在 <span class="text-accent">${winCount}</span> / ${ca.length} 个场景中获胜</span></div>`;
  return h;
}

function renderS6(sa,details){
  if(!sa&&(!details||!details.length))return empty('数据溯源','未返回引用溯源数据');
  let h='';
  if(sa?.top_sources?.length){
    h+=`<div class="table-wrap"><div class="table-row table-hdr" style="grid-template-columns:1fr 70px 50px 50px">
      <span>来源</span><span>类型</span><span class="text-center">权威度</span><span class="text-center">提及</span></div>`;
    sa.top_sources.forEach((s,i)=>{
      h+=`<div class="table-row" style="grid-template-columns:1fr 70px 50px 50px;cursor:default">
        <span class="font-mono text-accent text-xs">${s.domain}</span><span class="text-secondary text-xs">${s.source_type||'—'}</span>
        <span class="text-center font-mono text-xs">${s.authority_score??'—'}</span>
        <span class="text-center font-mono text-xs">${s.mention_count??'—'}</span></div>`;
    });
    h+=`</div>`;
    const d=sa.source_diversity;
    const dl=d>=0.7?'高':d>=0.4?'中':'低';
    const dc=d>=0.7?'#22C55E':d>=0.4?'#F59E0B':'#EF4444';
    h+=`<div class="flex items-center gap-3 mt-3 text-xs">
      <span class="text-muted">来源总数：<span class="font-mono" style="color:#EDEDF5">${sa.total_sources??'—'}</span></span>
      <span class="text-muted">多样性：<span class="font-mono" style="color:${dc}">${d!=null?(d*100).toFixed(0)+'%':'—'} · ${dl}</span></span>
    </div>`;
  }
  if(details&&details.length){
    const vis=details.slice(0,20).filter(d=>d.query);
    if(vis.length){
      h+=`<div class="table-wrap mt-4"><div class="table-row table-hdr" style="grid-template-columns:1fr 36px 56px 90px">
        <span>查询词</span><span class="text-center">提及</span><span class="text-center">位置</span><span>来源</span></div>`;
      vis.forEach((d,i)=>{
        h+=`<div class="table-row" style="grid-template-columns:1fr 36px 56px 90px" onclick="toggleExpand('cite${i}')">
          <span class="text-secondary leading-relaxed text-xs">${tr(d.query,40)}</span>
          <span class="text-center font-mono" style="color:${d.mentioned?'#22C55E':'#EF4444'}">${d.mentioned?'✓':'✗'}</span>
          <span class="text-center font-mono text-muted text-xs">${d.position||'—'}</span>
          <span class="font-mono text-accent text-xs">${tr(d.reference_source||'',18)}</span></div>`;
        if(d.mention_context){
          h+=`<div class="expand-detail" id="expand-cite${i}"><p class="text-secondary leading-relaxed">${d.mention_context}</p></div>`;
        }
      });
      h+=`</div>`;
    }
  }
  return h;
}

// ─── Init ──────────────────────────────────────────────
render();

// Trigger score bar animations
setTimeout(()=>{
  document.querySelectorAll('.score-bar-fill').forEach(el=>{
    const w=el.style.width;
    el.style.width='0%';
    requestAnimationFrame(()=>{el.style.width=w});
  });
},100);
</script>
</body>
</html>
