<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CiteFlow 抖音 - 图形版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px;
      background: #07070d;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      overflow: hidden;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    /* —— AMBIENT —— */
    .bg-glow-top {
      position: absolute; top: -300px; left: 50%; transform: translateX(-50%);
      width: 1200px; height: 800px;
      background: radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.09) 0%, transparent 60%);
    }
    .bg-glow-bot {
      position: absolute; bottom: -200px; left: 50%; transform: translateX(-50%);
      width: 1000px; height: 600px;
      background: radial-gradient(ellipse at 50% 70%, rgba(239,68,68,0.05) 0%, transparent 60%);
    }

    /* —— GEOMETRIC ELEMENTS —— */
    .geo {
      position: absolute; pointer-events: none;
    }
    /* Large ring top-right */
    .ring1 {
      top: -80px; right: -80px;
      width: 500px; height: 500px;
      border-radius: 50%;
      border: 1px solid rgba(59,130,246,0.08);
    }
    .ring1-inner {
      top: -30px; right: -30px;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(59,130,246,0.05);
    }
    /* Arc bottom-left */
    .ring2 {
      bottom: -120px; left: -120px;
      width: 450px; height: 450px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
    }
    /* Diagonal connector line */
    .diag {
      position: absolute;
      top: 0; right: 0;
      width: 600px; height: 1px;
      background: linear-gradient(135deg, transparent 0%, rgba(59,130,246,0.06) 40%, rgba(59,130,246,0.02) 100%);
      transform-origin: top right;
      transform: rotate(-28deg);
    }
    .diag2 {
      position: absolute;
      bottom: 0; left: 0;
      width: 500px; height: 1px;
      background: linear-gradient(135deg, rgba(56,189,248,0.04) 0%, rgba(56,189,248,0.01) 60%, transparent 100%);
      transform-origin: bottom left;
      transform: rotate(-28deg);
    }
    /* Dots grid */
    .dots {
      position: absolute;
      top: 25%; right: 10%;
      width: 120px; height: 120px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* —— MAIN CONTENT —— */
    .main {
      position: relative; z-index: 10;
      text-align: center;
      width: 800px;
    }

    /* AI徽标 */
    .ai-badge {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 14px 36px;
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 100px;
      margin-bottom: 80px;
    }
    .ai-badge-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #3B82F6;
      box-shadow: 0 0 20px rgba(59,130,246,0.5);
      animation: none;
    }
    .ai-badge-text {
      font-size: 26px; font-weight: 500;
      color: #38BDF8;
      letter-spacing: 0.12em;
    }

    /* Mega stat */
    .mega-num {
      font-size: 260px;
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: #ef4444;
      font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
      margin-bottom: 18px;
    }

    .mega-desc {
      font-size: 42px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.02em;
      margin-bottom: 40px;
    }
    .mega-desc-sub {
      font-size: 28px;
      color: #8892a8;
      font-weight: 400;
      margin-bottom: 100px;
    }

    /* —— DIVIDER WITH ICON —— */
    .divider-block {
      display: flex; align-items: center; gap: 30px;
      margin-bottom: 100px;
      width: 100%;
    }
    .div-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }
    .div-icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #131318;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }

    /* —— THREE SELLING POINTS —— */
    .points {
      display: flex; justify-content: center; gap: 60px;
      margin-bottom: 100px;
    }
    .point {
      text-align: center;
      width: 180px;
    }
    .point-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      border: 1px solid #222228;
      background: #131318;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
      font-size: 28px;
    }
    .point-num {
      font-size: 38px;
      font-weight: 700;
      color: #ffffff;
      font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
    }
    .point-label {
      font-size: 20px;
      color: #8892a8;
      margin-top: 6px;
    }

    /* —— CTA —— */
    .cta-btn {
      display: inline-block;
      padding: 30px 100px;
      background: #3B82F6;
      color: #fff;
      font-size: 38px;
      font-weight: 700;
      border-radius: 20px;
      letter-spacing: 0.06em;
      box-shadow: 0 20px 60px rgba(59,130,246,0.25);
    }
    .cta-sub {
      display: block;
      margin-top: 28px;
      font-size: 24px;
      color: #8892a8;
    }

    /* —— BRAND —— */
    .brand {
      position: absolute; bottom: 90px;
      display: flex; align-items: center; gap: 14px;
      z-index: 10;
    }
    .brand-mark {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: #3B82F6;
    }
    .brand-name {
      font-size: 26px; font-weight: 800;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .brand-tag {
      font-size: 16px; color: #8892a8;
      margin-left: 10px;
      letter-spacing: 0.05em;
    }

    /* —— CORNER ACCENT—— */
    .corner-tl {
      position: absolute; top: 60px; left: 60px;
      width: 60px; height: 60px;
      border-left: 1px solid rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .corner-br {
      position: absolute; bottom: 60px; right: 60px;
      width: 60px; height: 60px;
      border-right: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="bg-glow-top"></div>
  <div class="bg-glow-bot"></div>

  <div class="geo ring1"></div>
  <div class="geo ring1-inner"></div>
  <div class="geo ring2"></div>
  <div class="diag"></div>
  <div class="diag2"></div>
  <div class="dots"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="main">
    <div class="ai-badge">
      <div class="ai-badge-dot"></div>
      <div class="ai-badge-text">AI 品牌可见度检测</div>
    </div>

    <div class="mega-num">0%</div>
    <div class="mega-desc">你的品牌AI引用率</div>
    <div class="mega-desc-sub">90% 跨境品牌正在被 AI 无视</div>

    <div class="divider-block">
      <div class="div-line"></div>
      <div class="div-icon">🔍</div>
      <div class="div-line"></div>
    </div>

    <div class="points">
      <div class="point">
        <div class="point-icon">🤖</div>
        <div class="point-num">4</div>
        <div class="point-label">大 AI 引擎</div>
      </div>
      <div class="point">
        <div class="point-icon">⏱</div>
        <div class="point-num">3min</div>
        <div class="point-label">免费检测</div>
      </div>
      <div class="point">
        <div class="point-icon">📋</div>
        <div class="point-num">处方</div>
        <div class="point-label">不只给分</div>
      </div>
    </div>

    <div class="cta-btn">免费检测你的品牌</div>
    <div class="cta-sub">ChatGPT · Gemini · Claude · Perplexity 全平台覆盖</div>
  </div>

  <div class="brand">
    <div class="brand-mark"></div>
    <span class="brand-name">CiteFlow</span>
    <span class="brand-tag">跨境出海 GEO</span>
  </div>
</body>
</html>
